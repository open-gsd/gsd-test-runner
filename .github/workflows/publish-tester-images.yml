name: Publish Tester Images

# Triggers on tagged releases. Tag format: v<major>.<minor>.<patch>
# (semver). The tag value (minus "v" prefix) becomes the image version.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish as (without v prefix, e.g. 1.4.0). Used for manual triggers.'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  publish-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip leading "v" from tag
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing as version: ${VERSION} (tag: v${VERSION})"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Linux Tester Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/linux.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-linux:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-linux:latest
          build-args: |
            IMAGE_VERSION=${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}

      - name: Verify sentinel label (multi-arch aware)
        run: |
          # buildx imagetools inspect understands multi-arch manifest lists.
          # 'docker image inspect' on a manifest index returns the index entry,
          # not a single image config -- use imagetools instead.
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-linux:${{ steps.version.outputs.tag }}"
          OUTPUT=$(docker buildx imagetools inspect "$IMAGE" --format '{{ json .Image }}')
          # Verify amd64
          LABEL=$(echo "$OUTPUT" | jq -r '."linux/amd64".config.Labels."sh.gsd-test.image-version"')
          if [[ "$LABEL" != "${{ steps.version.outputs.tag }}" ]]; then
            echo "::error::Sentinel label mismatch (amd64): expected '${{ steps.version.outputs.tag }}', got '$LABEL'"
            exit 1
          fi
          # Verify arm64
          LABEL_ARM=$(echo "$OUTPUT" | jq -r '."linux/arm64".config.Labels."sh.gsd-test.image-version"')
          if [[ "$LABEL_ARM" != "${{ steps.version.outputs.tag }}" ]]; then
            echo "::error::Sentinel label mismatch (arm64): expected '${{ steps.version.outputs.tag }}', got '$LABEL_ARM'"
            exit 1
          fi
          echo "Sentinel label OK on both amd64 + arm64: $LABEL"

  publish-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            # Strip leading "v" from tag
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Publishing as version: $version (tag: v$version)"

      - name: Start Docker service and wait for daemon
        shell: pwsh
        run: |
          # windows-2022 runners have Docker Engine installed but the service
          # may not be auto-started. Docker Engine on Windows Server defaults
          # to Windows containers (no mode-switch needed; Docker Desktop's
          # DockerCli.exe -SwitchDaemon doesn't exist here).
          Write-Host "Starting Docker service..."
          Start-Service -Name docker -ErrorAction Stop

          # Wait for the daemon to accept connections
          $timeout = 60
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            docker info 2>$null | Out-Null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Docker daemon ready after $elapsed seconds"
              docker version
              exit 0
            }
            Start-Sleep -Seconds 2
            $elapsed += 2
          }
          Write-Error "Docker daemon did not become ready within $timeout seconds"
          exit 1

      - name: Log in to GHCR
        shell: pwsh
        run: |
          $token = "${{ secrets.GITHUB_TOKEN }}"
          $token | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Switch Docker to Windows containers mode
        shell: pwsh
        run: |
          # GitHub Actions windows-2022 runners default Docker to Linux containers (WSL2).
          # Windows-container builds require switching the daemon to Windows mode.
          Write-Host "Stopping Docker service..."
          Stop-Service -Name docker -Force -ErrorAction SilentlyContinue

          Write-Host "Switching to Windows containers..."
          & 'C:\Program Files\Docker\Docker\DockerCli.exe' -SwitchDaemon

          Write-Host "Starting Docker service..."
          Start-Service -Name docker

          # Wait for daemon
          $timeout = 60
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            try {
              docker info | Out-Null
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Docker daemon ready after $elapsed seconds"
                docker version
                break
              }
            } catch {}
            Start-Sleep -Seconds 2
            $elapsed += 2
          }
          if ($elapsed -ge $timeout) {
            Write-Error "Docker daemon did not become ready within $timeout seconds"
            exit 1
          }

      - name: Build Windows Tester Image
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $image = "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-windows:$tag"
          $latest = "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-windows:latest"
          docker build `
            -f dockerfiles/windows.Dockerfile `
            --build-arg "IMAGE_VERSION=$tag" `
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" `
            --label "org.opencontainers.image.revision=${{ github.sha }}" `
            --label "org.opencontainers.image.version=$tag" `
            -t $image -t $latest .
          docker push $image
          docker push $latest

      - name: Verify sentinel label
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $image = "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-windows:$tag"
          $label = docker image inspect $image --format '{{ index .Config.Labels "sh.gsd-test.image-version" }}'
          if ($label -ne $tag) {
            Write-Host "::error::Sentinel label mismatch: expected '$tag', got '$label'"
            exit 1
          }
          Write-Host "Sentinel label OK: $label"

  tag-macos-alias:
    # Per ADR-0020 (amended 2026-05-24): the macOS Tester Image is a re-tagged
    # alias of the Linux image. Mac developers run it via Docker Desktop or
    # colima -- Docker on macOS provides container isolation using the Linux
    # image as content. Pure manifest operation; no rebuild.
    needs: publish-linux
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag Linux image as macOS alias
        run: |
          # Use imagetools create to duplicate the full multi-arch manifest list.
          # 'docker pull/tag/push' only copies the platform-native image and
          # silently drops the other architectures from the manifest. imagetools
          # operates on the registry index directly, preserving all platforms.
          TAG="${{ steps.version.outputs.tag }}"
          LINUX_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-linux:$TAG"
          MACOS_IMAGE_VERSIONED="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-macos:$TAG"
          MACOS_IMAGE_LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-macos:latest"

          docker buildx imagetools create --tag "$MACOS_IMAGE_VERSIONED" "$LINUX_IMAGE"
          docker buildx imagetools create --tag "$MACOS_IMAGE_LATEST" "$LINUX_IMAGE"

      - name: Verify sentinel label on alias (multi-arch aware)
        run: |
          # The macOS alias is a re-tag of the multi-arch Linux manifest list.
          # buildx imagetools inspect works on multi-arch manifests; docker image
          # inspect would return the index entry rather than a platform image config.
          TAG="${{ steps.version.outputs.tag }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/gsd-tester-macos:$TAG"
          OUTPUT=$(docker buildx imagetools inspect "$IMAGE" --format '{{ json .Image }}')
          LABEL=$(echo "$OUTPUT" | jq -r '."linux/amd64".config.Labels."sh.gsd-test.image-version"')
          if [[ "$LABEL" != "$TAG" ]]; then
            echo "::error::Sentinel label mismatch on macOS alias (amd64): expected '$TAG', got '$LABEL'"
            exit 1
          fi
          echo "Sentinel label OK on macOS alias: $LABEL"
